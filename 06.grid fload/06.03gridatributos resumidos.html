<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <title>Grid atributos resumidos</title>
    <style>

      .contenedor{
        display: grid;
        grid-template-areas: 
        /* "header header header header" */
        "header header header header"
        "nav   main   main   aside"
        "nav   main   main   aside"
        "nav   main   main   aside"
        "nav   main   main   aside"
        "footer footer footer footer"
       
        ;
        grid-template-columns: 1fr 1fr 1fr 1fr ;
        grid-template-rows: 1fr 1fr 1fr 1fr 1fr 1fr;
        height: 800px;
      }
      header,footer{
        text-align: center;

      }
      header{
        background-color: gray;
        grid-area: header;
      }
      nav{
        background-color: orange;
        grid-area: nav ;
      }
      aside{
        background-color: green;
        grid-area: aside;
      }
      footer{
        background-color: blue;
        grid-area: footer;
        
      }
      main{
        background-color: brown;
        grid-area: main;
        
          }
      
    </style>
</head>
<body class="contenedor">
    <header>
        Distribucion grid con atributos.
    </header>
    <Main>
        Principal.
        
    </Main>
    <aside>
        Aside. 
    </aside>
        <nav>
        Menu. 
        </nav>
    <footer>
        Desenvolupado po Luis Pila. 
    </footer>
</body>
</html>
