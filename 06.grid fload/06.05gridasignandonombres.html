<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Distribucion de grid asigando nombre.</title>
    <style>
  header,footer{
        text-align: center;
  }
    .contenedor{
        display: grid;
        height: 800px;
        grid-column: 4*;
        grid-row:6* ;
    }    

      header{
       
        background-color: gray;
        grid-area: header;
        grid-column: 1/6;
        grid-row: 1/1;
      }
      nav{
        background-color: orange;
        grid-area: nav ;
        grid-column: 1/1;
        grid-row: 2/6;
       
      }
      aside{
        background-color: green;
        grid-area: aside;
        grid-column: 5/6;
        grid-row: 2/6;
      }
      footer{
        background-color: blue;
        grid-area: footer;
        grid-column: 1/6;
        grid-row: 5/6;
        
      }
      main{
        background-color: brown;
        grid-area: main;
        grid-column: 2/6;
        grid-row: 2/6;
        
          }
    </style>
</head>
<body class="contenedor">
    <header>
        <b>Cabecera</b>
    </header>
    <main>
        <b>Principal</b>
    </main>
    <aside>
        <b>Aside</b>
    </aside>
    <nav>
        <b>Menu</b>
    </nav>
    <Footer>
        Desenvolupado por Luis Pila.
    </Footer>
</body>
</html>
